{% extends "base.html" %}
{% block title %}Register — SecureVault{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card auth-card-wide">
    <div class="card-hero">
      <div class="shield-container">
        <div class="shield-pulse"></div>
        <div class="shield-glyph">⬡</div>
      </div>
      <h1 class="card-title">Create Account</h1>
      <p class="card-subtitle">Join the secure network</p>
    </div>

    {% if errors %}
      <div class="error-box">
        {% for e in errors %}<p>{{ e }}</p>{% endfor %}
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="field-grid">
        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">◈</span>
            <input type="text" id="username" name="username"
                   placeholder="3–30 chars, letters/numbers/_"
                   value="{{ username or '' }}" autocomplete="username" required>
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">◎</span>
            <input type="email" id="email" name="email"
                   placeholder="you@example.com"
                   value="{{ email or '' }}" autocomplete="email" required>
          </div>
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">◉</span>
          <input type="password" id="password" name="password"
                 placeholder="8+ chars, upper, lower, digit, special"
                 autocomplete="new-password" oninput="checkStrength(this.value)" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
        </div>
        <div class="strength-bar-wrap">
          <div class="strength-bar" id="strength-bar"></div>
        </div>
        <p class="strength-label" id="strength-label"></p>
      </div>

      <div class="field-group">
        <label for="confirm_password">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">◉</span>
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat your password"
                 autocomplete="new-password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('confirm_password')">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-primary">
        <span class="btn-text">Create Account</span>
        <span class="btn-arrow">→</span>
      </button>
    </form>

    <div class="card-footer">
      <span>Already registered?</span>
      <a href="{{ url_for('login') }}">Sign in →</a>
    </div>
  </div>
</div>
{% endblock %}
